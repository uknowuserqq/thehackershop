<!DOCTYPE html>
<html lang="es" class="no-copy">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacking & OSINT Store</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body oncontextmenu="return false;">
    <iframe id="bg-frame" src="fondo/fondo.html"></iframe>

    <header>
        <h1 class="title-glow">HACK STORE</h1>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Buscar herramienta o programa...">
        </div>

        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">Todas</button>
            <button class="filter-btn" data-filter="hacking">Hacking</button>
            <button class="filter-btn" data-filter="osint">OSINT</button>
            <button class="filter-btn" data-filter="free">Gratis</button>
            <button class="filter-btn" data-filter="paid">De pago</button>
        </div>
    </header>

    <main>
        <div class="product-grid" id="productGrid">
            <!-- Products will be injected by script.js -->
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Additional security to prevent devtools and common shortcuts
        document.onkeydown = function (e) {
            if (event.keyCode == 123) {
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) {
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) {
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) {
                return false;
            }
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) {
                return false;
            }
        };
    </script>
</body>

</html>
