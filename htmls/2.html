    <script>
        // Fallback Content Registry
        const contentBackup = {
     <li><span class="silver-black-specs">btmob es un troyano de acceso remoto (RAT) para Android de nueva generacion (2026) permitiendo hackear dispositivos de gama alta y ultimas versiones de android, algunas de sus funciones son : Entendido. Todo en una sola línea continua, separado por comas, sin categorías ni saltos de línea:

        };

        // Custom Feature Parser 2026 with Fail-Safe
        async function loadFeatures() {
            const path = window.location.pathname;
            const fileName = path.split('/').pop().replace('.html', '');
            const txtUrl = `../txts/${fileName}.txt`;

            try {
                const response = await fetch(txtUrl);
                if (!response.ok) throw new Error('Local Restriction');
                const text = await response.text();
                parseContent(text);
            } catch (err) {
                console.warn("Fetch failed, using internal fallback for ID:", fileName);
                const fallbackText = contentBackup[fileName];
                if (fallbackText) {
                    parseContent(fallbackText);
                } else {
                    document.getElementById('dynamicFeatures').innerHTML = `<div style="color: grey; text-align: center;">Error: Específicaciones no encontradas (${fileName})</div>`;
                }
            }
        }

        function parseContent(content) {
            const lines = content.split('\n');
            const container = document.getElementById('dynamicFeatures');
            container.innerHTML = '';

            lines.forEach(line => {
                line = line.trim();
                if (!line) return;

                const wrapper = document.createElement('div');
                wrapper.className = 'feature-line';

                if (line.startsWith('#')) {
                    const headerText = line.substring(1).trim();
                    container.insertAdjacentHTML('beforeend', `
                        <div class="feature-header-wrapper">
                            <div class="feature-header-text">${headerText}</div>
                            <div class="gradient-separator"></div>
                        </div>
                    `);
                    return;
                }

                const parts = line.split(',');
                if (parts.length < 2) return;

                let mainPart = parts[0].trim();
                let color = parts[1]?.trim() || 'white';
                let fontType = parts[2]?.trim() || 'normal';
                let fontWeight = parts[3]?.trim() || 'normal';

                let isGradient = mainPart.startsWith('gradiente.');
                if (isGradient) mainPart = mainPart.replace('gradiente.', '');

                let cleanText = mainPart.replace(/[*"]/g, '');

                const span = document.createElement('span');
                span.textContent = cleanText;

                if (fontType.includes('negrita')) span.classList.add('font-negrita');
                if (fontWeight.includes('bold')) span.classList.add('font-bold');
                if (fontType.includes('italic')) span.classList.add('font-italic');

                if (isGradient) {
                    span.classList.add('gradient-text');
                    if (color.includes('+')) {
                        const [c1, c2] = color.split('+').map(c => translateColor(c.trim()));
                        span.style.backgroundImage = `linear-gradient(90deg, ${c1}, ${c2})`;
                    } else {
                        const c1 = translateColor(color);
                        span.style.backgroundImage = `linear-gradient(90deg, ${c1}, rgba(255,255,255,0.2))`;
                    }
                } else {
                    span.style.color = translateColor(color);
                }

                wrapper.appendChild(span);
                container.appendChild(wrapper);
            });
        }

        function translateColor(c) {
            const colors = {
                'rojo': '#ff4d4d',
                'azul': '#4d4dff',
                'blanco': '#ffffff',
                'gris': '#888888',
                'plata': '#c0c0c0'
            };
            return colors[c.toLowerCase()] || c;
        }

        loadFeatures();

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function (e) {
            if (event.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) return false;
            if (e.ctrlKey && e.keyCode == 85) return false;
        };
    </script>
</body>
