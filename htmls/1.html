<!DOCTYPE html>
<html lang="es" class="no-copy">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>craxsrat 7.6</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos base para asegurar que el contenido dinámico se vea bien */
        .feature-line { margin-bottom: 12px; line-height: 1.6; }
        .gradient-text {
            display: inline-block;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }
        .font-bold { font-weight: bold; }
        .font-italic { font-style: italic; }
    </style>
</head>

<body oncontextmenu="return false;">
    <iframe id="bg-frame" src="../fondo/fondo.html"></iframe>

    <div class="plantilla-container">
        <div class="plantilla-left">
            <img src="../fotos/1.png" alt="craxs rat 7.6" class="main-product-img"
                onerror="this.src='https://via.placeholder.com/800x600?text=craxsrat'">

            <div class="stats-card">
                <div class="stat-item">
                    <div class="icon-box"><i class="fas fa-user-secret"></i></div>
                    <span class="stat-label">Creador</span>
                    <span class="stat-value">evlf_dev</span>
                </div>
                <div class="stat-item">
                    <div class="icon-box"><i class="fas fa-code-branch"></i></div>
                    <span class="stat-label">Versión</span>
                    <span class="stat-value">7.6</span>
                </div>
                <div class="stat-item">
                    <div class="icon-box"><i class="fas fa-microchip"></i></div>
                    <span class="stat-label">Tipo</span>
                    <span class="stat-value">Original</span>
                </div>
                <div class="stat-item">
                    <div class="icon-box"><i class="fas fa-tag"></i></div>
                    <span class="stat-label">Precio</span>
                    <span class="stat-value">25.00$</span>
                </div>
            </div>
        </div>

        <div class="plantilla-right">
            <div class="features-box">
                <div class="medium-feature-card" id="dynamicFeatures">
                    <div style="color: #444; text-align: center; padding: 20px;">Cargando especificaciones...</div>
                </div>
                <a href="../contacto.html" class="buy-btn" style="margin-top: 40px;">Adquirir Licencia</a>
            </div>
        </div>
    </div>

    <div style="text-align: center; margin-bottom: 6rem;">
        <a href="../principal.html" class="filter-btn">dashboard</a>
    </div>

    <script>
    // 1. Backup corregido (Sin errores de sintaxis)
    const contentBackup = {
       "1": "# CraxsRAT 7.6\ngradiente.*CraxsRAT es un troyano de acceso remoto para Android altamente sofisticado. Control total, webcam, robar credenciales y más.*, white+red, bold, bold"
    };

    async function loadFeatures() {
        const path = window.location.pathname;
        const fileName = path.split('/').pop().replace('.html', '');
        const txtUrl = `../txts/${fileName}.txt`;

        try {
            const response = await fetch(txtUrl);
            if (!response.ok) throw new Error('Not found');
            const text = await response.text();
            parseContent(text);
        } catch (err) {
            console.warn("Cargando Backup para:", fileName);
            const fallbackText = contentBackup[fileName];
            if (fallbackText) {
                parseContent(fallbackText);
            } else {
                document.getElementById('dynamicFeatures').innerHTML = `<div style="color: grey; text-align: center;">ID no encontrado: ${fileName}</div>`;
            }
        }
    }

    function parseContent(content) {
        const lines = content.split('\n');
        const container = document.getElementById('dynamicFeatures');
        container.innerHTML = '';

        lines.forEach(line => {
            line = line.trim();
            if (!line) return;

            // Manejo de títulos (#)
            if (line.startsWith('#')) {
                const headerText = line.substring(1).trim();
                container.insertAdjacentHTML('beforeend', `
                    <div class="feature-header-wrapper" style="margin-bottom: 20px;">
                        <div class="feature-header-text" style="font-size: 1.5rem; color: #fff; font-weight: bold;">${headerText}</div>
                        <div class="gradient-separator" style="height: 2px; background: linear-gradient(90deg, #ff4d4d, transparent); margin-top: 5px;"></div>
                    </div>
                `);
                return;
            }

            // Procesar línea normal
            const parts = line.split(',');
            let mainText = parts[0].trim();
            let colorPart = parts[1]?.trim() || 'blanco';
            let fontType = parts[2]?.trim() || 'normal';
            let fontWeight = parts[3]?.trim() || 'normal';

            // Detectar gradiente
            let isGradient = mainText.startsWith('gradiente.');
            if (isGradient) mainText = mainText.replace('gradiente.', '');

            // Limpiar asteriscos y comillas
            let cleanText = mainText.replace(/[*"]/g, '');

            const wrapper = document.createElement('div');
            wrapper.className = 'feature-line';

            const span = document.createElement('span');
            span.textContent = cleanText;

            // Estilos de fuente
            if (line.includes('*') || fontType.includes('negrita') || fontWeight.includes('bold')) {
                span.classList.add('font-bold');
            }
            if (fontType.includes('italic')) span.classList.add('font-italic');

            // Aplicar Color o Gradiente
            if (isGradient) {
                span.classList.add('gradient-text');
                if (colorPart.includes('+')) {
                    const [c1, c2] = colorPart.split('+').map(c => translateColor(c.trim()));
                    span.style.backgroundImage = `linear-gradient(90deg, ${c1}, ${c2})`;
                } else {
                    const c1 = translateColor(colorPart);
                    span.style.backgroundImage = `linear-gradient(90deg, ${c1}, #ffffff)`;
                }
            } else {
                span.style.color = translateColor(colorPart);
            }

            wrapper.appendChild(span);
            container.appendChild(wrapper);
        });
    }

    function translateColor(c) {
        const colors = {
            'rojo': '#ff4d4d',
            'azul': '#4d4dff',
            'blanco': '#ffffff',
            'gris': '#888888',
            'plata': '#c0c0c0'
        };
        return colors[c.toLowerCase()] || c;
    }

    loadFeatures();

    // Bloqueos de seguridad
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function (e) {
        if (e.keyCode == 123) return false;
        if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) return false;
        if (e.ctrlKey && e.keyCode == 85) return false;
    };
</script>
</body>
</html>
