<!DOCTYPE html>
<html lang="es" class="no-copy">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>craxsrat 7.6</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .feature-line { margin-bottom: 15px; line-height: 1.6; display: block; }
        .gradient-text {
            display: inline-block;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }
        .font-bold { font-weight: bold; }
        .font-italic { font-style: italic; }
        #dynamicFeatures { min-height: 100px; }
    </style>
</head>

<body oncontextmenu="return false;">
    <iframe id="bg-frame" src="../fondo/fondo.html"></iframe>

    <div class="plantilla-container">
        <div class="plantilla-left">
            <img src="../fotos/1.png" alt="craxs rat 7.6" class="main-product-img"
                onerror="this.src='https://via.placeholder.com/800x600?text=craxsrat'">

            <div class="stats-card">
                <div class="stat-item">
                    <div class="icon-box"><i class="fas fa-user-secret"></i></div>
                    <span class="stat-label">Creador</span>
                    <span class="stat-value">evlf_dev</span>
                </div>
                <div class="stat-item">
                    <div class="icon-box"><i class="fas fa-code-branch"></i></div>
                    <span class="stat-label">Versión</span>
                    <span class="stat-value">7.6</span>
                </div>
                <div class="stat-item">
                    <div class="icon-box"><i class="fas fa-microchip"></i></div>
                    <span class="stat-label">Tipo</span>
                    <span class="stat-value">Original</span>
                </div>
                <div class="stat-item">
                    <div class="icon-box"><i class="fas fa-tag"></i></div>
                    <span class="stat-label">Precio</span>
                    <span class="stat-value">25.00$</span>
                </div>
            </div>
        </div>

        <div class="plantilla-right">
            <div class="features-box">
                <div class="medium-feature-card" id="dynamicFeatures">
                    <div style="color: #888; text-align: center; padding: 20px;">Iniciando sistema...</div>
                </div>
                <a href="../contacto.html" class="buy-btn" style="margin-top: 40px;">Adquirir Licencia</a>
            </div>
        </div>
    </div>

    <div style="text-align: center; margin-bottom: 6rem;">
        <a href="../principal.html" class="filter-btn">dashboard</a>
    </div>

<script>
    // Backup ultra-simple. Sin comas locas al final, sin formatos raros.
    const contentBackup = {
        "1": "# CraxsRAT 7.6\nCraxsRAT es un troyano de acceso remoto para Android altamente sofisticado. Funciones: Control total, webcam, robar credenciales, ver pantalla, contactos, llamadas y mucho más."
    };

    async function loadFeatures() {
        const path = window.location.pathname;
        const fileName = path.split('/').pop().replace('.html', '');
        
        // Intentamos cargar el TXT
        try {
            const response = await fetch(`../txts/${fileName}.txt`);
            if (!response.ok) throw new Error();
            const text = await response.text();
            parseContent(text);
        } catch (err) {
            // Si falla el TXT, usamos el backup sí o sí
            const fallback = contentBackup[fileName];
            if (fallback) {
                parseContent(fallback);
            } else {
                document.getElementById('dynamicFeatures').innerHTML = "ID no encontrado: " + fileName;
            }
        }
    }

    function parseContent(text) {
        const container = document.getElementById('dynamicFeatures');
        container.innerHTML = ''; // Limpiamos el "Cargando..."

        const lines = text.split('\n');

        lines.forEach(line => {
            if (!line.trim()) return;

            const div = document.createElement('div');
            div.style.marginBottom = "15px";

            if (line.startsWith('#')) {
                // Es un título
                div.innerHTML = `<h2 style="color:#ff4d4d; font-size:1.5rem; margin:0;">${line.replace('#', '').trim()}</h2>
                                 <div style="height:2px; background:red; width:50px; margin-top:5px;"></div>`;
            } else {
                // Es texto normal
                div.innerHTML = `<p style="color:white; line-height:1.6; margin:0;">${line.trim()}</p>`;
            }
            container.appendChild(div);
        });
    }

    loadFeatures();

    // Bloqueos de seguridad (Tus llaves)
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function (e) {
        if (e.keyCode == 123) return false;
        if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) return false;
        if (e.ctrlKey && e.keyCode == 85) return false;
    };
</script>
</body>
</html>
